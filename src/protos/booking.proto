syntax = "proto3";

package booking;

service BookingService {
  rpc CreateBooking (CreateBookingRequest) returns (BookingResponse);
  
  rpc GetBookingHistory (GetHistoryRequest) returns (HistoryResponse);
  
  rpc CancelBooking (CancelBookingRequest) returns (BookingResponse);
}

// --- MESSAGE ---
message BookingResponse {
  bool success = 1;
  string message = 2;
  int32 booking_id = 3;
}

message CreateBookingRequest {
  int32 doctor_id = 1;
  int32 patient_id = 2;      
  int32 profile_id = 3;      
  string date = 4;          
  string time_type = 5;      
  string reason = 6;       
  repeated string photos = 7;  
}

message GetHistoryRequest {
  int32 patient_id = 1;
}

message BookingItem {
  int32 id = 1;
  string doctor_name = 2;
  string date = 3;
  string time_display = 4;   // "8:00 - 9:00"
  string status = 5;         // pending, confirmed, cancelled...
  string reason = 6;
  string patient_name = 7;   // Tên người đi khám (Lấy từ Profile)
}

message HistoryResponse {
  bool success = 1;
  repeated BookingItem data = 2;
}

message CancelBookingRequest {
  int32 id = 1;         // ID booking
  int32 patient_id = 2; // Check quyền chính chủ
}