syntax = "proto3";

package booking;

service BookingService {
  // 1. Đặt lịch khám
  rpc CreateBooking (CreateBookingRequest) returns (BookingResponse);
  
  // 2. Lấy lịch sử (Chỉ lấy những đơn is_deleted = 0)
  rpc GetBookingHistory (GetHistoryRequest) returns (HistoryResponse);
  
  // 3. Hủy lịch (Dành cho Bệnh nhân - status sang 'cancelled' + hoàn slot)
  rpc CancelBooking (CancelBookingRequest) returns (BookingResponse);

  // 4. Xóa ảo đơn hàng (Dành cho Admin - is_deleted sang 1)
  rpc DeleteBooking (DeleteBookingRequest) returns (BookingResponse);
}

// --- MESSAGE ---
message BookingResponse {
  bool success = 1;
  string message = 2;
  int32 booking_id = 3;
}

message CreateBookingRequest {
  int32 doctor_id = 1;
  int32 patient_id = 2;       
  int32 profile_id = 3;       
  string date = 4;           
  string time_type = 5;      
  string reason = 6;       
  repeated string photos = 7;
  int32 service_id = 8; // Nếu đặt dịch vụ thì truyền cái này, không thì thôi
  string address = 9;
}

message GetHistoryRequest {
  int32 patient_id = 1;
}

message BookingItem {
  int32 id = 1;
  string doctor_name = 2;
  string date = 3;
  string time_display = 4; 
  string status = 5;       
  string reason = 6;
  string patient_name = 7;
  string service_name = 8; // Hiện tên dịch vụ (nếu có)
  double price = 9;        // Hiện giá tiền đã đặt
  string address = 10;
}

message HistoryResponse {
  bool success = 1;
  repeated BookingItem data = 2;
}

message CancelBookingRequest {
  int32 booking_id = 1; // Đổi id thành booking_id cho đồng bộ với response
  int32 patient_id = 2;
}

message DeleteBookingRequest {
  int32 booking_id = 1;
}