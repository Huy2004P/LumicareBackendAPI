syntax = "proto3";

package notification;

service NotificationService {
  // 1. Lấy danh sách thông báo của tôi
  rpc GetMyNotifications (GetMyNotificationsRequest) returns (NotificationListResponse);

  // 2. Đánh dấu đã đọc
  rpc MarkAsRead (MarkAsReadRequest) returns (StatusResponse);
}

// Dùng chung cho các phản hồi trạng thái đơn giản
message StatusResponse { 
  bool success = 1; 
  string message = 2; 
}

message GetMyNotificationsRequest { 
  int32 user_id = 1; 
}

message MarkAsReadRequest { 
  int32 id = 1; 
}

message NotificationItem {
  int32 id = 1;
  int32 user_id = 2;
  string title = 3;   // <-- THÊM DÒNG NÀY: Để Flutter hiện tiêu đề in đậm
  string message = 4; 
  string type = 5;
  bool is_read = 6;
  string created_at = 7;
}

message NotificationListResponse {
  bool success = 1;
  string message = 2; // <-- THÊM DÒNG NÀY: Để báo "Lấy danh sách thành công"
  repeated NotificationItem data = 3;
}