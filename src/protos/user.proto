syntax = "proto3";

package user;

service UserService {
  rpc GetAllUsers (UserFilterRequest) returns (UserListResponse);
  rpc ToggleUserStatus (UserStatusRequest) returns (UserActionResponse);
  rpc ResetPassword (UserStatusRequest) returns (UserActionResponse);
  rpc DeleteUser (UserStatusRequest) returns (UserActionResponse);
}

message UserResponse {
  int32 id = 1;
  string email = 2;
  string role = 3;
  string fullName = 4;
  bool active = 5;
  string createdAt = 6;
}

message UserFilterRequest {
  string searchTerm = 1;
  string role = 2;
}

message UserListResponse {
  repeated UserResponse users = 1;
}

message UserStatusRequest {
  int32 id = 1;
}

message UserActionResponse {
  bool success = 1;
  string message = 2;
}