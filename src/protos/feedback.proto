syntax = "proto3";

package feedback;

service FeedbackService {
  // 1. Gửi đánh giá sau ca khám
  rpc SendFeedback (FeedbackRequest) returns (FeedbackResponse);

  // 2. Lấy danh sách đánh giá của một bác sĩ
  rpc GetDoctorFeedbacks (DoctorIdRequest) returns (FeedbackListResponse);

  // 3. Lấy tất cả đánh giá (Dành cho Admin)
  rpc GetAllFeedbacks (Empty) returns (FeedbackListResponse);
}

// KHÔNG ĐƯỢC THIẾU: Định nghĩa message rỗng cho hàm GetAll
message Empty {}

message FeedbackRequest {
  int32 booking_id = 1;
  int32 patient_id = 2;
  int32 doctor_id = 3;
  int32 rating = 4; // 1-5 sao
  string comment = 5;
}

message FeedbackResponse {
  bool success = 1;
  string message = 2;
}

message DoctorIdRequest {
  int32 doctor_id = 1;
}

message FeedbackItem {
  int32 id = 1;
  string patient_name = 2;
  string doctor_name = 3; // HUY THÊM DÒNG NÀY: Để Admin biết bác sĩ nào được đánh giá
  int32 rating = 4;
  string comment = 5;
  string created_at = 6;
  int32 booking_id = 7; // Thêm cái này để Admin cần thì đối soát lịch hẹn
}

message FeedbackListResponse {
  bool success = 1;
  repeated FeedbackItem data = 2;
  double average_rating = 3;
}